<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
   <!--------- CSS ---------->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/carrito.css">

    <!--------- Google Fonts ---------->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!--------- Font Awesome ---------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
    
    <!--------- Header ---------->
    <header>
        <div class="header">
            <a href="../index.html"><img class="logo" src="../img/Logo.png" alt="HWStore"></a>

            <button class="hamburguesa" id="abrir" aria-label="Abrir menú de navegación">
                <i class="fa-solid fa-bars"></i>
            </button>

            <nav class="nav" id="menu">

                <button class="cerrar" id="cerrar" aria-label="Cerrar menú de navegación">
                    <i class="fa-solid fa-xmark"></i>
                </button>

                <ul class="nav-list">
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="../pages/productos.html">Productos</a></li>
                    <li><a href="../pages/contacto.html">Contacto</a></li>

                    <li>
                        <a href="../pages/carrito.html" class="icono-carrito">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span id="contador-carrito">0</span>
                        </a>
                    </li>
                </ul>

            </nav>
        </div>
    </header>

    <main class="carrito-container">

        <div id="carrito">
            <h2>Mi Carrito</h2>
            
            <table border="1" id="tabla-carrito">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th>Eliminar</th>
                    </tr>
                </thead>
                <tbody id="lista-carrito"></tbody>

            </table>

            <p id="mensaje-vacio" style="display: none;">
                <i class="fa-solid fa-cart-arrow-down icon-carrito"></i>
                Tu carrito esta vacio
            </p>

            
            <div class="total-carrito">
                <h3 class="total">
                    Total: <span id="total-carrito">$0</span>
                </h3>
            </div>

            <button id="vaciar-carrito">Vaciar carrito</button>
            <button id="finalizar-compra">Finalizar Compra</button>

            <div id="modal" class="modal">
                <div class="modal-contenido">
                    <p>El carrito se ha vaciado.</p>
                    <button id="cerrarModal">Aceptar</button>
                </div>
            </div>

            <div id="modal-compra" class="modal">
                <div class="modal-contenido">
                    <p>Gracias por realizar tu compra!</p>
                    <button id="cerrarModalCompra">Aceptar</button>
                </div>
            </div>

        </div>

    </main>


    <!--------- Footer ---------->
    <footer>
        <p>&copy; 2026 - HW-Store</p>
    </footer>
    
    <!--------- JavaScript ---------->
    <script src="../js/carrito.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
