<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Tienda</title>

    <!--------- CSS ---------->
    <link rel="stylesheet" href="../css/style.css">

    <!--------- Google Fonts ---------->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!--------- Font Awesome ---------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!--------- Header ---------->
    <header>
        <div class="header">
            <h1 class="logo">Tienda</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="../pages/contacto.html">Contacto</a></li>
                    <li><i class="fa-solid fa-bars hamburguesa"></i></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="contacto">
            <h1>Contacto</h1>
        </section>

        <div class="formulario">
            <h2 class="form-contacto">Formulario de contacto</h2>

            <form action="https://formspree.io/f/mdabzqej" method="POST">
                
                <label>Nombre</label>
                <input type="text" name="nombre" placeholder="Ingrese su nombre" required>

                <label>Email</label>
                <input type="email" name="email" placeholder="Ingrese su email" required>

                <label>Mensaje</label>
                <textarea name="message" placeholder="Escriba su mensaje" rows="4" cols="50" required></textarea>

                <button type="submit">Enviar</button>

            </form>

        </div>

    </main>



    <!--------- Footer ---------->
    <footer>&copy; 2026 - Tienda</footer>
</body>
</html>
