<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Tienda</title>

    <!--------- CSS ---------->
    <link rel="stylesheet" href="../css/style.css">

    <!--------- Google Fonts ---------->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!--------- Font Awesome ---------->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!--------- Header ---------->
    <header>
        <div class="header">
            <a href="../index.html"><img class="logo" src="../img/Logo.png" alt="HWStore"></a>

            <button class="hamburguesa" id="abrir" aria-label="Abrir menú de navegación">
                <i class="fa-solid fa-bars"></i>
            </button>

            <nav class="nav" id="menu">

                <button class="cerrar" id="cerrar" aria-label="Cerrar menú de navegación">
                    <i class="fa-solid fa-xmark"></i>
                </button>

                <ul class="nav-list">
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="../pages/productos.html">Productos</a></li>
                    <li><a href="../pages/contacto.html">Contacto</a></li>

                    <li>
                        <a href="../pages/carrito.html" class="icono-carrito">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span id="contador-carrito">0</span>
                        </a>
                    </li>
                </ul>

            </nav>
        </div>
    </header>

    <main>
        <section class="contacto">
            <h1>Contacto</h1>
        </section>

        <div class="formulario">

            <h2 class="form-contacto">Formulario de contacto</h2>

            <form action="https://formspree.io/f/mdabzqej" method="POST" id="contactForm">
                
            <label for="nombre">Nombre</label>
            <input id="nombre" name="nombre" placeholder="Ingrese su nombre">
            <span class="error" id="errorNombre"></span>

            <label for="email">Email</label>
            <input id="email" name="email" placeholder="Ingrese su email">
            <span class="error" id="errorEmail"></span>

            <label for="mensaje">Mensaje</label>
            <textarea name="message" id="mensaje" placeholder="Escriba su mensaje" rows="4" cols="50"></textarea>
            <span class="error" id="errorMensaje"></span>

            <button type="submit" id="btnEnviar">Enviar</button>

            </form>

        </div>


    </main>



    <!--------- Footer ---------->
    <footer>
        <p>&copy; 2026 - HW-Store</p>
    </footer>
    
    <!--------- JavaScript ---------->
    <script src="../js/productos.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/contacto.js"></script>
</body>
</html>
